
services:

  backend:
    build: 
        context: .
        dockerfile: Dockerfile_backend
    volumes:
        - ./src/backend:/app/src/backend
        - ./src/models:/app/src/models
        - ./src/util:/app/src/util
    ports:
        - "8000:8000"
    env_file:
        - .env
    command: uvicorn src.backend.api:app --host 0.0.0.0 --port 8000
  
  frontend:
    build:
        context: .
        dockerfile: Dockerfile_frontend
    volumes:
        - ./src/frontend:/app/src/frontend
    ports:
        - "8080:8080"
    env_file:
        - .env

    command: >
        streamlit run src/frontend/app.py
        --server.port=8080
        --server.address=0.0.0.0
