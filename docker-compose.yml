
services:

  backend:
    build: 
        context: .
        dockerfile: Dockerfile_backend
    ports:
        - "8000:8000"
    env_file:
        .env
    command: uvicorn src.backend.api:app --host 0.0.0.0 --port 8000
  
  frontend:
    build:
        context: .
        dockerfile: Dockerfile_frontend
    ports:
        - "8501:8501"
    env_file:
        .env

    command: >
        streamlit run src/frontend/app.py
        --server.port=8501
        --server.address=0.0.0.0
